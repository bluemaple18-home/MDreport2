<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23161b22'/%3E%3Cpath d='M8 9h16v4H8zm0 7h11v4H8zm0 7h16v4H8z' fill='%23f6f8fa'/%3E%3C/svg%3E" />
    <title>multiFORCE 廣告格式展示</title>
    <style>
      :root {
        --ink: #0d0d0d;
        --muted: #666f76;
        --line: #d9e1e7;
        --surface: #f5f7f8;
        --panel: #ffffff;
        --accent: #ff7a1a;
        --accent-dark: #df5d00;
        --accent-soft: #fff0e5;
        --teal: #0f766e;
        --teal-soft: #e8f5f2;
        --icon: #4d4d4d;
        --shadow: #0d0d0d12;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          linear-gradient(180deg, #ffffff 0%, #f7f8f9 42%, #eef3f5 100%),
          var(--surface);
        color: var(--ink);
        font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Inter, "Segoe UI", sans-serif;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        background:
          radial-gradient(720px 420px at 92% -8%, #ff7a1a2c 0%, transparent 62%),
          radial-gradient(760px 480px at 82% 34%, #ff7a1a16 0%, transparent 68%),
          radial-gradient(860px 520px at 94% 78%, #ff7a1a12 0%, transparent 70%),
          linear-gradient(90deg, transparent 0%, #ff7a1a08 76%, #ff7a1a10 100%);
        content: "";
      }

      button,
      input {
        font: inherit;
      }

      .page {
        position: relative;
        z-index: 0;
        width: min(100%, 1720px);
        margin: 0 auto;
        padding: 22px 18px 42px;
      }

      .hero {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(260px, 360px);
        align-items: end;
        gap: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: linear-gradient(135deg, #ffffff 0%, #f7f9fa 64%, #fff4eb 100%);
        padding: 24px;
        overflow: hidden;
        box-shadow: 0 12px 28px var(--shadow);
      }

      .hero::after {
        position: absolute;
        top: -58px;
        right: -42px;
        width: 168px;
        height: 168px;
        border: 28px solid #ff7a1a;
        border-left-color: transparent;
        border-bottom-color: transparent;
        border-radius: 50%;
        opacity: 0.15;
        transform: rotate(14deg);
        content: "";
      }

      .hero > * {
        position: relative;
        z-index: 1;
      }

      .kicker {
        margin: 0 0 7px;
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.11em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1.12;
        letter-spacing: 0;
      }

      .hero p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 15px;
      }

      .period {
        display: inline-block;
        margin-left: 8px;
        color: #425966;
        font-weight: 700;
      }

      .search label {
        display: block;
        margin-bottom: 7px;
        font-size: 13px;
        font-weight: 700;
      }

      .search input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        padding: 10px 12px;
        outline: none;
      }

      .search input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px #ff7a1a24;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin: 16px 0 0;
      }

      .device-toggle {
        display: inline-flex;
        gap: 6px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        padding: 4px;
        box-shadow: 0 8px 18px var(--shadow);
      }

      .device-toggle button {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-width: 92px;
        justify-content: center;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: #4d4d4d;
        padding: 9px 14px;
        font-size: 14px;
        font-weight: 800;
        line-height: 1;
        cursor: pointer;
      }

      .device-toggle button::before,
      .demo-actions a::before {
        flex: 0 0 auto;
        content: "";
      }

      .device-toggle button::before {
        width: 13px;
        height: 10px;
        border: 1.8px solid currentColor;
        border-radius: 2px;
        box-shadow: 0 4px 0 -2.4px currentColor;
      }

      .device-toggle button[data-device="mobile"]::before {
        width: 8px;
        height: 13px;
        border-radius: 3px;
        box-shadow: inset 0 -2px 0 -1px currentColor;
      }

      .device-toggle button.active {
        background: var(--teal);
        color: #fff;
        box-shadow: 0 6px 14px #0f766e24;
      }

      .device-toggle button[data-device="mobile"].active {
        background: var(--accent);
        box-shadow: 0 6px 14px #ff7a1a2e;
      }

      .typebar-wrap {
        position: relative;
        overflow: hidden;
      }

      .typebar {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding: 18px 0 14px;
        scroll-snap-type: x proximity;
        scrollbar-width: none;
      }

      .typebar::-webkit-scrollbar {
        display: none;
      }

      .typebar button {
        flex: 0 0 auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: #2b3338;
        padding: 9px 13px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        scroll-snap-align: start;
      }

      .typebar button span {
        margin-left: 8px;
        color: #72858e;
        font-weight: 700;
      }

      .typebar button.active {
        border-color: var(--accent);
        background: var(--accent-soft);
        color: var(--accent-dark);
        box-shadow: inset 0 -3px 0 #ff7a1a;
      }

      @keyframes typebar-peek {
        0%,
        100% {
          transform: translateX(0);
        }

        45% {
          transform: translateX(-18px);
        }
      }

      .section {
        margin-top: 18px;
      }

      .section-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        border-bottom: 1px solid var(--line);
        padding: 0 0 10px;
        margin-bottom: 12px;
      }

      .section-head h2 {
        margin: 0;
        font-size: 20px;
      }

      .section-title {
        display: flex;
        align-items: baseline;
        gap: 10px;
        min-width: 0;
      }

      .material-spec {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        white-space: nowrap;
      }

      .section-head span {
        color: #6b7f89;
        font-size: 13px;
        font-weight: 700;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .card {
        display: grid;
        grid-template-columns: 150px minmax(0, 1fr);
        min-height: 248px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 10px 24px var(--shadow);
        overflow: hidden;
      }

      .media {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 248px;
        background:
          radial-gradient(circle at 50% 18%, #38434a 0%, transparent 42%),
          #20282d;
        padding: 12px;
      }

      .media img {
        display: block;
        width: min(100%, 112px);
        max-height: 224px;
        object-fit: contain;
        border-radius: 6px;
      }

      .media.desktop img {
        width: min(100%, 132px);
      }

      .body {
        display: flex;
        min-width: 0;
        flex-direction: column;
        gap: 9px;
        padding: 14px;
      }

      .title-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .title-row h3 {
        margin: 0;
        font-size: 18px;
        line-height: 1.25;
      }

      .copy {
        margin: 0;
        color: #4d4d4d;
        font-size: 14px;
        line-height: 1.7;
      }

      .performance {
        display: grid;
        gap: 8px;
        border-top: 1px solid var(--line);
        padding-top: 10px;
      }

      .metric-month {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .metric-row {
        display: grid;
        gap: 8px;
      }

      .metric-row.compact {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .metric {
        border: 1px solid #e0e5e8;
        border-radius: 8px;
        background: #f8fafb;
        padding: 8px;
      }

      .metric-label {
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
      }

      .metric-value {
        display: block;
        margin-top: 3px;
        color: var(--ink);
        font-size: 16px;
        font-weight: 800;
        line-height: 1.15;
      }

      .metric-delta {
        display: grid;
        gap: 2px;
        margin-top: 5px;
        border-radius: 999px;
        padding: 4px 6px;
        font-size: 11px;
        font-weight: 800;
        line-height: 1.05;
      }

      .metric-delta span {
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .metric-delta span + span {
        opacity: 0.82;
      }

      .metric-delta.good {
        background: #e8f5f2;
        color: #0f766e;
      }

      .metric-delta.bad {
        background: #fdecec;
        color: #c7372f;
      }

      .metric-delta.neutral {
        background: #edf1f3;
        color: #66747b;
      }

      .history {
        border: 1px solid #e0e5e8;
        border-radius: 8px;
        background: #fff;
        overflow: hidden;
      }

      .history summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 10px;
        color: #4d4d4d;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        list-style: none;
      }

      .history summary::-webkit-details-marker {
        display: none;
      }

      .history summary::after {
        width: 7px;
        height: 7px;
        border-right: 2px solid currentColor;
        border-bottom: 2px solid currentColor;
        transform: rotate(45deg) translateY(-2px);
        content: "";
      }

      .history[open] summary::after {
        transform: rotate(225deg) translateY(-2px);
      }

      .history-month {
        display: grid;
        gap: 6px;
        border-top: 1px solid #edf1f3;
        padding: 8px;
      }

      .history-month .metric-row.compact {
        gap: 6px;
      }

      .history-month .metric {
        padding: 7px;
      }

      .history-month .metric-value {
        font-size: 14px;
      }

      .demo-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      .demo-actions a {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid transparent;
        border-radius: 999px;
        background: var(--teal);
        color: #fff;
        padding: 8px 12px;
        font-size: 14px;
        font-weight: 800;
        line-height: 1;
        text-decoration: none;
        box-shadow: 0 6px 14px #0f766e24;
      }

      .demo-actions a::before {
        width: 13px;
        height: 10px;
        border: 1.8px solid currentColor;
        border-radius: 2px;
        box-shadow: 0 4px 0 -2.4px currentColor;
      }

      .demo-actions a.device-mobile {
        background: var(--accent);
        box-shadow: 0 6px 14px #ff7a1a28;
      }

      .demo-actions a.device-mobile::before {
        width: 8px;
        height: 13px;
        border-radius: 3px;
        box-shadow: inset 0 -2px 0 -1px currentColor;
      }

      .demo-actions a:hover {
        border-color: var(--accent);
        filter: brightness(0.96);
      }

      .empty {
        border: 1px dashed var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--muted);
        padding: 24px;
        text-align: center;
      }

      @media (max-width: 1180px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .card {
          grid-template-columns: 138px minmax(0, 1fr);
        }
      }

      @media (max-width: 820px) {
        .page {
          padding: 14px 10px 28px;
        }

        .hero {
          grid-template-columns: 1fr;
          padding: 18px;
        }

        h1 {
          font-size: 30px;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .section-head {
          align-items: flex-start;
          gap: 8px;
        }

        .section-title {
          flex-direction: column;
          gap: 3px;
        }

        .material-spec {
          font-size: 12px;
          white-space: normal;
        }

        .toolbar {
          position: sticky;
          top: 0;
          z-index: 30;
          margin: 12px -10px 0;
          padding: 10px 10px 8px;
          background: color-mix(in srgb, var(--surface) 94%, #ffffff 6%);
          box-shadow: 0 8px 20px #10233410;
        }

        .device-toggle {
          width: 100%;
        }

        .device-toggle button {
          flex: 1 1 0;
          min-width: 0;
          padding: 12px 10px;
          font-size: 16px;
        }

        .typebar-wrap {
          position: sticky;
          top: 58px;
          z-index: 20;
          margin: 0 -10px 12px;
          background: color-mix(in srgb, var(--surface) 94%, #ffffff 6%);
          box-shadow: 0 8px 20px #10233412;
        }

        .typebar-wrap::before,
        .typebar-wrap::after {
          position: absolute;
          top: 0;
          bottom: 0;
          width: 48px;
          z-index: 2;
          opacity: 0;
          pointer-events: none;
          transition: opacity 0.16s ease;
          content: "";
        }

        .typebar-wrap::before {
          left: 0;
          background: linear-gradient(90deg, var(--surface) 20%, #f6faf800 100%);
        }

        .typebar-wrap::after {
          right: 0;
          background: linear-gradient(90deg, #f6faf800 0%, var(--surface) 72%);
        }

        .typebar-wrap.can-left::before,
        .typebar-wrap.can-right::after {
          opacity: 1;
        }

        .typebar {
          gap: 14px;
          padding: 18px 52px 14px 0;
        }

        .typebar.hint-peek {
          animation: typebar-peek 1.15s ease-out 0.45s 2;
        }

        @media (prefers-reduced-motion: reduce) {
          .typebar.hint-peek {
            animation: none;
          }
        }

        .typebar button {
          padding: 12px 16px;
          font-size: 18px;
        }
      }

      @media (max-width: 560px) {
        .card {
          grid-template-columns: 1fr;
          min-height: 0;
        }

        .media {
          min-height: 260px;
        }

        .media img,
        .media.desktop img {
          width: min(100%, 168px);
          max-height: 248px;
        }

        .body {
          padding: 13px;
        }

        .title-row h3 {
          font-size: 17px;
        }

        .copy {
          font-size: 13px;
          line-height: 1.65;
        }

        .demo-actions {
          gap: 6px;
        }

        .demo-actions a {
          padding: 8px 10px;
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div>
          <p class="kicker">multiFORCE GIF Catalog</p>
          <h1>廣告格式展示</h1>
          <p>
            本月有成效 <span id="format-count">0</span> 種格式 / <span id="gif-count">0</span> 個 GIF<span class="period" id="period-label"></span>
            <span class="period" id="total-label"></span>
          </p>
        </div>
        <div class="search">
          <label for="format-search">搜尋</label>
          <input id="format-search" name="format-search" type="search" placeholder="格式或 Excel 文案" autocomplete="off" />
        </div>
      </header>

      <div class="toolbar">
        <div class="device-toggle" id="device-toggle" aria-label="裝置切換">
          <button type="button" class="active" data-device="mobile">Mobile</button>
          <button type="button" data-device="desktop">PC</button>
        </div>
      </div>

      <div class="typebar-wrap">
        <nav class="typebar" id="typebar" aria-label="廣告格式分類"></nav>
      </div>
      <div id="content" class="content"><div class="empty">載入中</div></div>
    </main>

    <script src="multiforce-data/standalone-data.js"></script>
    <script>
      const TYPE_ORDER = [
        "Banner",
        "文中300x250",
        "文中320x480",
        "創意-其他",
        "創意-蓋版",
        "置底-非展開",
        "置底-展開",
        "桌機置底-展開",
        "影音摩天",
        "影音型",
        "DOOH 與其他",
        "其他",
      ];
      const DEVICE_LABELS = { mobile: "Mobile", desktop: "PC" };
      let catalog = [];
      let categoryMap = {};
      let excelCopyMap = { bySizeId: {}, byTitle: {} };
      let performanceMap = { byNid: {}, startDay: "", endDay: "" };
      let activeType = "全部";
      let activeDevice = "mobile";
      let query = "";
      let typebarHintDismissed = false;

      function normalizeType(value) {
        return String(value || "").trim() || "其他";
      }

      function typeSortKey(value) {
        const index = TYPE_ORDER.indexOf(normalizeType(value));
        return index >= 0 ? index : TYPE_ORDER.length;
      }

      function displayCategory(value) {
        return String(value || "").replace(/-/g, " - ");
      }

      function categoryMaterialSpec(value) {
        const type = normalizeType(value);
        if (type === "置底-非展開") return "素材尺寸：640x360";
        if (type === "置底-展開" || type === "桌機置底-展開") return "素材尺寸：640x360 + 900x1600";
        return "";
      }

      function categoryForItem(item) {
        const candidates = (item.sizeIds || [])
          .map((sizeId) => categoryMap[String(sizeId)]?.siteCostCategory)
          .filter((value) => value && String(value).trim());
        if (!candidates.length) return normalizeType(item.typeTitle);
        return [...candidates].sort((a, b) => typeSortKey(a) - typeSortKey(b) || a.localeCompare(b, "zh-Hant"))[0];
      }

      function mappedDetailsForItem(item) {
        const seen = new Set();
        const details = [];
        for (const sizeId of item.sizeIds || []) {
          const detail = categoryMap[String(sizeId)];
          if (!detail || seen.has(String(sizeId))) continue;
          seen.add(String(sizeId));
          details.push(detail);
        }
        return details;
      }

      function normalizeCopyKey(value) {
        return String(value || "").replace(/\s+/g, "").toLowerCase();
      }

      function excelCopyForItem(item) {
        for (const sizeId of item.sizeIds || []) {
          const copy = excelCopyMap.bySizeId?.[String(sizeId)]?.featureCopy;
          if (copy) return copy;
        }
        return excelCopyMap.byTitle?.[normalizeCopyKey(item.title)]?.featureCopy || "";
      }

      function performanceForItem(item) {
        return performanceMap.byNid?.[String(item.nid)] || null;
      }

      function carouselForItem(item) {
        return (item.carousels || []).find((entry) => entry.device === activeDevice) || null;
      }

      function isDisplayableItem(item) {
        return Boolean(performanceForItem(item)) && Boolean(carouselForItem(item));
      }

      function compareItemsByPerformance(a, b) {
        const aPerformance = performanceForItem(a) || {};
        const bPerformance = performanceForItem(b) || {};
        const impressionsDiff = Number(bPerformance.impressions || 0) - Number(aPerformance.impressions || 0);
        if (impressionsDiff) return impressionsDiff;
        const cpcDiff = Number(aPerformance.cpc || 0) - Number(bPerformance.cpc || 0);
        if (cpcDiff) return cpcDiff;
        return Number(a.nid || 0) - Number(b.nid || 0);
      }

      function groupSortMetric(items) {
        const sorted = [...items].sort(compareItemsByPerformance);
        const topItem = sorted[0] || {};
        const performance = performanceForItem(topItem) || {};
        return {
          impressions: Number(performance.impressions || 0),
          cpc: Number(performance.cpc || 0),
        };
      }

      function compareGroupsByPerformance(a, b) {
        const aMetric = groupSortMetric(a.items);
        const bMetric = groupSortMetric(b.items);
        const impressionsDiff = bMetric.impressions - aMetric.impressions;
        if (impressionsDiff) return impressionsDiff;
        const cpcDiff = aMetric.cpc - bMetric.cpc;
        if (cpcDiff) return cpcDiff;
        return a.type.localeCompare(b.type, "zh-Hant");
      }

      function formatInteger(value) {
        return Math.round(Number(value || 0)).toLocaleString("zh-Hant");
      }

      function formatCurrency(value) {
        return Number(value || 0).toLocaleString("zh-Hant", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        });
      }

      function formatPercent(value) {
        return `${Number(value || 0).toFixed(2)}%`;
      }

      function formatMonthLabel(value) {
        const [year, month] = String(value || "").split("-");
        if (!year || !month) return String(value || "");
        return `${year}/${month}`;
      }

      function metricFromRaw(rows) {
        const totals = rows.reduce((sum, row) => ({
          impressions: sum.impressions + Number(row.impressions || 0),
          clicks: sum.clicks + Number(row.clicks || 0),
          dspAmount: sum.dspAmount + Number(row.dspAmount || 0),
        }), { impressions: 0, clicks: 0, dspAmount: 0 });
        return {
          ctr: totals.impressions > 0 ? (totals.clicks / totals.impressions) * 100 : 0,
          cpm: totals.impressions > 0 ? (totals.dspAmount / totals.impressions) * 1000 : 0,
          cpc: totals.clicks > 0 ? totals.dspAmount / totals.clicks : 0,
        };
      }

      function deltaForMetric(metric, latest, baseline) {
        const latestValue = Number(latest?.[metric] || 0);
        const baselineValue = Number(baseline?.[metric] || 0);
        if (!baseline || !Number.isFinite(baselineValue)) return null;
        const diff = latestValue - baselineValue;
        const lowerIsBetter = metric === "cpm" || metric === "cpc";
        const isGood = Math.abs(diff) < 0.00001 ? null : lowerIsBetter ? diff < 0 : diff > 0;
        return { diff, className: isGood === null ? "neutral" : isGood ? "good" : "bad" };
      }

      function renderMetricDelta(metric, latest, previousRows) {
        if (!previousRows.length) return "";
        const baseline = metricFromRaw(previousRows);
        const delta = deltaForMetric(metric, latest, baseline);
        if (!delta) return "";
        const absDiff = Math.abs(delta.diff);
        const prefix = delta.diff > 0 ? "+" : delta.diff < 0 ? "-" : "";
        const value = metric === "ctr" ? `${absDiff.toFixed(2)}pt` : `$${formatCurrency(absDiff)}`;
        const baselineValue = Number(baseline[metric] || 0);
        const percentDiff = baselineValue ? (delta.diff / baselineValue) * 100 : 0;
        const percentPrefix = percentDiff > 0 ? "+" : percentDiff < 0 ? "-" : "";
        const percentValue = `${percentPrefix}${Math.abs(percentDiff).toFixed(1)}%`;
        return `<span class="metric-delta ${delta.className}" title="相較前兩月原始數據重算基準"><span>${prefix}${escapeHtml(value)}</span><span>${escapeHtml(percentValue)}</span></span>`;
      }

      function localAssetPath(path) {
        const value = String(path || "");
        if (!value || /^https?:\/\//i.test(value) || value.startsWith("data:")) return value;
        if (location.protocol !== "file:") return value;
        if (value.startsWith("/multiforce-data/")) return `multiforce-data/${value.slice("/multiforce-data/".length)}`;
        if (value.startsWith("/multiforce-gifs/")) return `multiforce-gifs/${value.slice("/multiforce-gifs/".length)}`;
        return value;
      }

      function buildDemoHref(item, carousel) {
        if (carousel.demoLink) return carousel.demoLink;
        const device = carousel.device === "desktop" ? "pc" : "mobile";
        return `https://demopage.multiforce.com.tw/demo/${item.nid}?device=${device}`;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function getTypeCounts() {
        const counts = new Map();
        for (const item of catalog.filter(isDisplayableItem)) {
          const type = categoryForItem(item);
          counts.set(type, (counts.get(type) || 0) + 1);
        }
        return Array.from(counts.entries())
          .map(([type, count]) => ({ type, count }))
          .sort((a, b) => typeSortKey(a.type) - typeSortKey(b.type) || a.type.localeCompare(b.type, "zh-Hant"));
      }

      function getVisibleItems() {
        const token = query.trim().toLowerCase();
        return catalog
          .filter((item) => activeType === "全部" || categoryForItem(item) === activeType)
          .filter(isDisplayableItem)
          .filter((item) => {
            if (!token) return true;
            const mappedDetails = mappedDetailsForItem(item);
            return [
              item.title,
              item.typeTitle,
              (item.sizeIds || []).join(" "),
              categoryForItem(item),
              excelCopyForItem(item),
              performanceForItem(item)?.matchedSizeIds?.join(" ") || "",
              mappedDetails.map((detail) => `${detail.material} ${detail.siteCostCategory} ${detail.detailDefinition}`).join(" "),
            ].join(" ").toLowerCase().includes(token);
          })
          .sort(compareItemsByPerformance);
      }

      function renderTypebar() {
        const typebar = document.getElementById("typebar");
        const counts = getTypeCounts();
        const options = [{ type: "全部", count: catalog.filter(isDisplayableItem).length }, ...counts];
        typebar.innerHTML = options.map(({ type, count }) => `
          <button type="button" class="${type === activeType ? "active" : ""}" data-type="${escapeHtml(type)}">
            ${escapeHtml(displayCategory(type))}<span>${count}</span>
          </button>
        `).join("");
        requestAnimationFrame(() => {
          updateTypebarHint();
          startTypebarPeekHint();
        });
      }

      function updateTypebarHint() {
        const typebar = document.getElementById("typebar");
        const wrap = typebar.closest(".typebar-wrap");
        const maxScroll = typebar.scrollWidth - typebar.clientWidth;
        wrap.classList.toggle("can-left", typebar.scrollLeft > 4);
        wrap.classList.toggle("can-right", maxScroll > 4 && typebar.scrollLeft < maxScroll - 4);
      }

      function startTypebarPeekHint() {
        const typebar = document.getElementById("typebar");
        if (typebarHintDismissed || typebar.scrollWidth <= typebar.clientWidth) return;
        typebar.classList.add("hint-peek");
        window.setTimeout(() => typebar.classList.remove("hint-peek"), 2900);
      }

      function dismissTypebarPeekHint() {
        typebarHintDismissed = true;
        document.getElementById("typebar").classList.remove("hint-peek");
      }

      function renderContent() {
        const content = document.getElementById("content");
        const visibleItems = getVisibleItems();
        let grouped = [];
        if (activeType === "全部") {
          grouped = [{ type: "全部", items: visibleItems }];
        } else {
          const groups = new Map();
          for (const item of visibleItems) {
            const type = categoryForItem(item);
            groups.set(type, [...(groups.get(type) || []), item]);
          }
          grouped = Array.from(groups.entries())
            .map(([type, items]) => ({ type, items: [...items].sort(compareItemsByPerformance) }))
            .sort(compareGroupsByPerformance);
        }
        if (!grouped.length) {
          content.innerHTML = `<div class="empty">沒有符合條件的廣告格式</div>`;
          return;
        }
        content.innerHTML = grouped.map(({ type, items }) => `
          <section class="section">
            <header class="section-head">
              <div class="section-title">
                <h2>${escapeHtml(displayCategory(type))}</h2>
                ${categoryMaterialSpec(type) ? `<span class="material-spec">${escapeHtml(categoryMaterialSpec(type))}</span>` : ""}
              </div>
              <span>${items.length} 項</span>
            </header>
            <div class="grid">
              ${items.map(renderCard).join("")}
            </div>
          </section>
        `).join("");
      }

      function renderCard(item) {
        const carousel = carouselForItem(item);
        const excelCopy = excelCopyForItem(item);
        const performance = performanceForItem(item);
        const history = [...(performance?.monthlyHistory || [])].sort((a, b) => String(b.month || "").localeCompare(String(a.month || "")));
        const latestPerformance = history[0] || performance;
        const previousPerformance = history.slice(1);
        const baselineRows = previousPerformance.slice(0, 2);
        const mediaClass = carousel?.device === "desktop" ? "media desktop" : "media";
        const demoAction = carousel ? `
          <a class="device-${escapeHtml(carousel.device || "demo")}" href="${escapeHtml(buildDemoHref(item, carousel))}" target="_blank" rel="noreferrer">
            ${escapeHtml(DEVICE_LABELS[carousel.device] || carousel.device || "Demo")} Demo
          </a>
        ` : "";
        return `
          <article class="card">
            <div class="${mediaClass}">
              <img src="${escapeHtml(localAssetPath(carousel?.localGif || ""))}" alt="${escapeHtml(item.title)}" loading="lazy" />
            </div>
            <div class="body">
              <div class="title-row">
                <div>
                  <h3>${escapeHtml(item.title)}</h3>
                </div>
                <div class="demo-actions" aria-label="Live Demo">${demoAction}</div>
              </div>
              ${excelCopy ? `<p class="copy">${escapeHtml(excelCopy)}</p>` : ""}
              ${performance ? `
                <div class="performance" aria-label="月報成效">
                  <div class="metric-row">
                    <div class="metric">
                      <span class="metric-label">曝光</span>
                      <span class="metric-value">${escapeHtml(formatInteger(latestPerformance.impressions))}</span>
                    </div>
                  </div>
                  <span class="metric-month">${escapeHtml(formatMonthLabel(latestPerformance.month))}</span>
                  <div class="metric-row compact">
                    <div class="metric">
                      <span class="metric-label">CPM</span>
                      <span class="metric-value">$${escapeHtml(formatCurrency(latestPerformance.cpm))}</span>
                      ${renderMetricDelta("cpm", latestPerformance, baselineRows)}
                    </div>
                    <div class="metric">
                      <span class="metric-label">CTR</span>
                      <span class="metric-value">${escapeHtml(formatPercent(latestPerformance.ctr))}</span>
                      ${renderMetricDelta("ctr", latestPerformance, baselineRows)}
                    </div>
                    <div class="metric">
                      <span class="metric-label">CPC</span>
                      <span class="metric-value">$${escapeHtml(formatCurrency(latestPerformance.cpc))}</span>
                      ${renderMetricDelta("cpc", latestPerformance, baselineRows)}
                    </div>
                  </div>
                  ${previousPerformance.length ? `
                    <details class="history">
                      <summary>前 ${previousPerformance.length} 個月成效</summary>
                      ${previousPerformance.map((monthPerformance) => `
                        <div class="history-month">
                          <span class="metric-month">${escapeHtml(formatMonthLabel(monthPerformance.month))}</span>
                          <div class="metric-row compact">
                            <div class="metric">
                              <span class="metric-label">CPM</span>
                              <span class="metric-value">$${escapeHtml(formatCurrency(monthPerformance.cpm))}</span>
                            </div>
                            <div class="metric">
                              <span class="metric-label">CTR</span>
                              <span class="metric-value">${escapeHtml(formatPercent(monthPerformance.ctr))}</span>
                            </div>
                            <div class="metric">
                              <span class="metric-label">CPC</span>
                              <span class="metric-value">$${escapeHtml(formatCurrency(monthPerformance.cpc))}</span>
                            </div>
                          </div>
                        </div>
                      `).join("")}
                    </details>
                  ` : ""}
                </div>
              ` : ""}
            </div>
          </article>
        `;
      }

      function render() {
        renderDeviceToggle();
        const performanceItems = catalog.filter(isDisplayableItem);
        document.getElementById("format-count").textContent = performanceItems.length;
        document.getElementById("gif-count").textContent = performanceItems.length;
        const startMonth = String(performanceMap.startDay || "").slice(0, 7);
        document.getElementById("period-label").textContent = startMonth ? ` · ${startMonth}` : "";
        document.getElementById("total-label").textContent = ` · 全部 ${catalog.length} 種格式 / ${catalog.reduce((sum, item) => sum + (item.carousels || []).length, 0)} 個 GIF`;
        renderTypebar();
        renderContent();
      }

      function renderDeviceToggle() {
        document.querySelectorAll("#device-toggle button[data-device]").forEach((button) => {
          button.classList.toggle("active", button.dataset.device === activeDevice);
        });
      }

      function scrollToContentTop() {
        const content = document.getElementById("content");
        const toolbar = document.querySelector(".toolbar");
        const typebarWrap = document.querySelector(".typebar-wrap");
        const toolbarOffset = getComputedStyle(toolbar).position === "sticky" ? toolbar.offsetHeight : 0;
        const typebarOffset = getComputedStyle(typebarWrap).position === "sticky" ? typebarWrap.offsetHeight : 0;
        const stickyOffset = toolbarOffset + typebarOffset;
        const targetTop = window.scrollY + content.getBoundingClientRect().top - stickyOffset - 8;
        window.scrollTo({ top: Math.max(0, targetTop), behavior: "smooth" });
      }

      async function init() {
        try {
          if (window.MULTIFORCE_STANDALONE_DATA) {
            const data = window.MULTIFORCE_STANDALONE_DATA;
            catalog = (data.catalog || []).filter((item) => item.hasGif);
            categoryMap = data.categoryMap || {};
            excelCopyMap = data.excelCopyMap || { bySizeId: {}, byTitle: {} };
            performanceMap = data.performanceMap || { byNid: {}, startDay: "", endDay: "" };
            render();
            return;
          }
          const [catalogResp, mapResp, copyResp, performanceResp] = await Promise.all([
            fetch(localAssetPath("/multiforce-data/multiforce-catalog.json"), { cache: "no-store" }),
            fetch(localAssetPath("/multiforce-data/format-category-map.json"), { cache: "no-store" }),
            fetch(localAssetPath("/multiforce-data/excel-format-copy.json"), { cache: "no-store" }),
            fetch(localAssetPath("/multiforce-data/monthly-performance.json"), { cache: "no-store" }),
          ]);
          if (!catalogResp.ok || !mapResp.ok || !copyResp.ok || !performanceResp.ok) throw new Error(`HTTP ${catalogResp.status}/${mapResp.status}/${copyResp.status}/${performanceResp.status}`);
          catalog = (await catalogResp.json()).filter((item) => item.hasGif);
          categoryMap = await mapResp.json();
          excelCopyMap = await copyResp.json();
          performanceMap = await performanceResp.json();
          render();
        } catch (error) {
          document.getElementById("content").innerHTML = `<div class="empty">GIF catalog 讀取失敗</div>`;
        }
      }

      document.getElementById("format-search").addEventListener("input", (event) => {
        query = event.target.value;
        renderContent();
      });
      document.getElementById("device-toggle").addEventListener("click", (event) => {
        const button = event.target.closest("button[data-device]");
        if (!button || button.dataset.device === activeDevice) return;
        activeDevice = button.dataset.device;
        render();
        requestAnimationFrame(scrollToContentTop);
      });
      document.getElementById("typebar").addEventListener("click", (event) => {
        const button = event.target.closest("button[data-type]");
        if (!button) return;
        activeType = button.dataset.type;
        render();
        requestAnimationFrame(scrollToContentTop);
      });
      document.getElementById("typebar").addEventListener("scroll", () => {
        updateTypebarHint();
      }, { passive: true });
      document.getElementById("typebar").addEventListener("pointerdown", dismissTypebarPeekHint, { passive: true });
      document.getElementById("typebar").addEventListener("touchstart", dismissTypebarPeekHint, { passive: true });
      window.addEventListener("resize", () => {
        updateTypebarHint();
        startTypebarPeekHint();
      });
      init();
    </script>
  </body>
</html>
